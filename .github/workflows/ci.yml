name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
      - name: Lint with ruff
        run: ruff check src/DiscordAutoJoin/ tests/ --output-format=github
      - name: Format check with ruff
        run: ruff format --check src/DiscordAutoJoin/ tests/

  type-check:
    name: Type Check (mypy)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mypy
          pip install -e .
      - name: Run mypy
        run: mypy src/DiscordAutoJoin/ --show-error-codes

  security:
    name: Security Scan (bandit)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit
      - name: Run bandit
        run: bandit -r src/DiscordAutoJoin/ -f json -o bandit-report.json --exit-zero
      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/ -m "not integration" --cov=src/DiscordAutoJoin --cov-report=xml --cov-report=term -v
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    name: Build Package
    runs-on: windows-latest
    needs: [lint, type-check, security, test]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build wheel
        run: python -m build --wheel
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: discordautojoin-wheel
          path: dist/*.whl

  publish:
    name: Publish to PyPI
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, type-check, security, test, build]
    environment:
      name: pypi
      url: https://pypi.org/project/DiscordAutoJoin/
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify tag matches package version
        run: |
          $tag = "${{ github.ref_name }}" -replace '^v', ''
          $pkg = (python -c "import runpy; print(runpy.run_path('src/DiscordAutoJoin/main.py')['VERSION'])")
          if ($tag -ne $pkg) {
            Write-Error "Tag version '$tag' does not match package version '$pkg'"
            exit 1
          }
          Write-Host "Version verified: $tag == $pkg"
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build wheel
        run: python -m build --wheel
      - name: Check wheel
        run: twine check dist/*.whl
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist